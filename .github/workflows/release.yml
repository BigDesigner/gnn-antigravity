name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version Override (Optional, e.g., 1.0.1). If empty, version will be read from style.css'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version from style.css
        id: get_version
        run: |
          VERSION_INPUT="${{ github.event.inputs.version_override }}"
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
          else
            VERSION=$(grep -m 1 "Version:" style.css | awk '{print $2}')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Build Directory and Zip
        run: |
          # Define zip name
          ZIP_NAME="gnn-antigravity-${{ env.VERSION }}.zip"
          
          # Create a temporary directory for clean build and a subfolder for the theme
          mkdir -p build/gnn-antigravity
          
          # Use rsync to copy files, excluding the build directory itself and other dev files
          # This is more robust than 'cp' for recursive situations
          rsync -av --exclude='build' \
                    --exclude='.git' \
                    --exclude='.github' \
                    --exclude='memory-bank' \
                    --exclude='specs' \
                    --exclude='agents' \
                    --exclude='tasks' \
                    --exclude='docs' \
                    --exclude='archive' \
                    --exclude='.gitignore' \
                    --exclude='implementation_plan.md' \
                    --exclude='task.md' \
                    --exclude='walkthrough.md' \
                    ./ build/gnn-antigravity/
          
          # Zip the build directory (this will include the gnn-antigravity folder)
          cd build && zip -r "../$ZIP_NAME" gnn-antigravity && cd ..
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
