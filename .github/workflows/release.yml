name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version Override (Optional, e.g., 1.0.1). If empty, version will be read from style.css'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version from style.css
        id: get_version
        run: |
          VERSION_INPUT="${{ github.event.inputs.version_override }}"
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
          else
            VERSION=$(grep -m 1 "Version:" style.css | awk '{print $2}')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Build Directory and Zip
        run: |
          # Define zip name
          ZIP_NAME="gnn-antigravity-${{ env.VERSION }}.zip"
          
          # Create a temporary directory for clean build
          mkdir build
          
          # Copy only necessary files to build directory
          # Using rsync-like behavior with cp or find to avoid including hidden git files
          cp -r ./* build/
          
          # Remove files we don't want in the zip
          rm -rf build/.git
          rm -rf build/.github
          rm -rf build/memory-bank
          rm -rf build/specs
          rm -rf build/agents
          rm -rf build/tasks
          rm -rf build/docs
          rm -rf build/.gitignore
          rm -rf build/implementation_plan.md
          rm -rf build/task.md
          rm -rf build/walkthrough.md
          rm -rf build/build # avoid recursive build folder
          
          # Zip the build directory
          cd build && zip -r "../$ZIP_NAME" . && cd ..
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          files: ${{ env.ZIP_NAME }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
